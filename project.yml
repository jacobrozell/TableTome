name: Tabletome
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
options:
  bundleIdPrefix: com.jacobrozell
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "7JT2JB89AV"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "11"

configs:
  Debug: debug
  Release: release

targets:
  Tabletome:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Features
        excludes:
          - "**/README.md"
      - path: DesignSystem
        excludes:
          - "**/README.md"
      - path: Support
        excludes:
          - "**/README.md"
      - path: Resources/Rules
        buildPhase: resources
        type: folder
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/Catalogs
        buildPhase: resources
        type: folder
      - path: Resources/GoogleService-Info.plist
        type: file
        buildPhase: resources
    dependencies:
      - target: TabletomeDomain
      - target: TabletomeData
      - target: TabletomeHobbyData
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
    postBuildScripts:
      - name: Firebase Crashlytics
        script: |
          if [ "${CONFIGURATION}" != "Release" ]; then
            exit 0
          fi
          if ! [ -f "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/GoogleService-Info.plist" ]; then
            exit 0
          fi
          if grep -q "REPLACE_WITH" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/GoogleService-Info.plist" 2>/dev/null; then
            exit 0
          fi
          RUN_SCRIPT="${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run"
          if [ ! -f "$RUN_SCRIPT" ]; then
            echo "warning: Crashlytics run script not found at $RUN_SCRIPT"
            exit 0
          fi
          "$RUN_SCRIPT"
        inputFileLists:
          - Scripts/FirebaseCrashlyticsInputFiles.xcfilelist
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.tabletome
        INFOPLIST_KEY_CFBundleDisplayName: Tabletome
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.reference
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Tabletome uses the local network to sync match state between two nearby devices."
        INFOPLIST_KEY_NSBonjourServices:
          - _tabletome-match._tcp
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    preBuildScripts:
      - name: SwiftLint
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint --config "${SRCROOT}/.swiftlint.yml"
          fi
        basedOnDependencyAnalysis: false

  TabletomeDomain:
    type: framework
    platform: iOS
    sources:
      - path: Domain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.tabletome.domain
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: complete

  TabletomeData:
    type: framework
    platform: iOS
    sources:
      - path: Data
        excludes:
          - "Hobby/**"
    dependencies:
      - target: TabletomeDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.tabletome.data
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: complete

  TabletomeHobbyData:
    type: framework
    platform: iOS
    sources:
      - path: Data/Hobby
    dependencies:
      - target: TabletomeDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.tabletome.hobbydata
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: complete

  TabletomeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/Unit
        excludes:
          - "**/Fixtures/**"
      - path: Tests/Unit/Fixtures
        buildPhase: resources
      - path: Resources/Rules
        buildPhase: resources
        type: folder
    dependencies:
      - target: Tabletome
      - target: TabletomeDomain
      - target: TabletomeData
      - target: TabletomeHobbyData
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.tabletome.tests
        GENERATE_INFOPLIST_FILE: YES

  TabletomeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UI
    dependencies:
      - target: Tabletome
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.tabletome.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Tabletome

schemes:
  Tabletome:
    build:
      targets:
        Tabletome: all
        TabletomeTests: [test]
        TabletomeUITests: [test]
    test:
      targets:
        - TabletomeTests
        - TabletomeUITests
    run:
      config: Debug

  TabletomeCI:
    build:
      targets:
        Tabletome: all
        TabletomeTests: [test]
        TabletomeUITests: [test]
    test:
      targets:
        - TabletomeTests
        - TabletomeUITests
    run:
      config: Debug
