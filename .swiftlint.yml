disabled_rules:
  - trailing_whitespace
  - todo

opt_in_rules:
  - empty_count
  - explicit_init
  - fatal_error_message
  - first_where
  - redundant_nil_coalescing

line_length:
  warning: 140
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y

excluded:
  - DerivedData
  - .build
  - Data/Hobby
  - Features/Bench
  - Features/Muster
  - DesignSystem/Hobby
  - Support/Hobby
  - Domain/Muster
