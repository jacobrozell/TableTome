name: Tabletome
options:
  bundleIdPrefix: com.jacobrozell
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "7JT2JB89AV"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

configs:
  Debug: debug
  Release: release

targets:
  Tabletome:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Features
      - path: DesignSystem
      - path: Support
      - path: Resources/Rules
        buildPhase: resources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - target: TabletomeDomain
      - target: TabletomeData
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.tabletome
        INFOPLIST_KEY_CFBundleDisplayName: Tabletome
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    preBuildScripts:
      - name: SwiftLint
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint --config "${SRCROOT}/.swiftlint.yml"
          fi
        basedOnDependencyAnalysis: false

  TabletomeDomain:
    type: framework
    platform: iOS
    sources:
      - path: Domain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.tabletome.domain
        GENERATE_INFOPLIST_FILE: YES

  TabletomeData:
    type: framework
    platform: iOS
    sources:
      - path: Data
    dependencies:
      - target: TabletomeDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.tabletome.data
        GENERATE_INFOPLIST_FILE: YES

  TabletomeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/Unit
        excludes:
          - "**/Fixtures/**"
      - path: Resources/Rules
        buildPhase: resources
    dependencies:
      - target: Tabletome
      - target: TabletomeDomain
      - target: TabletomeData
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.tabletome.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Tabletome:
    build:
      targets:
        Tabletome: all
        TabletomeTests: [test]
    test:
      targets:
        - TabletomeTests
    run:
      config: Debug

  TabletomeCI:
    build:
      targets:
        Tabletome: all
        TabletomeTests: [test]
    test:
      targets:
        - TabletomeTests
    run:
      config: Debug
